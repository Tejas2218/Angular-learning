<p>data-put works!</p>
<div>

    <table border="1">

        <tr class="heading">
            <th>Name</th>
            <th>Email</th>
            <th>Mobile</th>
            <th>Aadhar No</th>
            <th>Address</th>
            <th>Age</th>
        </tr>

        @for(user of userData; track $index){

            <tr class="data" (click)="openData(user)">

                <td>{{user.name}}</td>
                <td>{{user.email}}</td>
                <td>{{user.mobile}}</td>
                <td>{{user.aadharCardNumber}}</td>
                <td>{{user.address}}</td>
                <td>{{user.age}}</td>

            </tr>

        }

    </table>

</div>
