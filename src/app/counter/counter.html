<h1>counter App</h1>
<div style="text-align: center;">
    <h2 class="count">{{count}}</h2>
    <button class="btn bg-red" (click)="handleCount('-')">Decrement</button>
    <button class="btn bg-black" (click)="handleCount('0')">Reset</button>
    <button class="btn bg-green" (click)="handleCount('+')">Increment</button>
</div>
