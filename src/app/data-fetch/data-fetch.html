<div>
    <table border="1" cellspacing="0" cellpadding="10">

    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Mobile</th>
            <th>Aadhar No</th>
            <th>Address</th>
            <th>Age</th>
        </tr>
    </thead>
    

    <tbody>
        @for (user of userList; track $index) {

            <tr>
                <td>{{user.name}}</td>
                <td>{{user.email}}</td>
                <td>{{user.mobile}}</td>
                <td>{{user.aadharCardNumber}}</td>
                <td>{{user.address}}</td>
                <td>{{user.age}}</td>
            </tr>

        }
    </tbody>

</table>
    
</div>
